version: "3.9"

services:
  quant-api:
    build:
      context: ../services/quant-api
    ports:
      - "8000:8000"
    volumes:
      - ../../data:/app/data:ro

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    volumes:
      - ../apps/web:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    image: python:3.13-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python worker.py"
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../services/worker:/app
    depends_on:
      - redis
